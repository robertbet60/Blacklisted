# fly.toml app configuration file generated for blacklisted-o2ywpa on 2026-04-24T01:19:31Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'blacklisted-o2ywpa'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  POLL_INTERVAL = '60'
  PORT = '8000'
  TELEGRAM_POLL_INTERVAL = '300'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
