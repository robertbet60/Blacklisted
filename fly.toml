# Fly.io deployment config — São Paulo (Brazilian IP)
# Deploy command:  fly launch --copy-config --no-deploy  (first time only)
#                  fly deploy
#
# See DEPLOY.md for the full step-by-step.

app = "illegalbet-scanner"
primary_region = "gru"   # São Paulo, Brazil — Brazilian IP, avoids geo-blocking

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  POLL_INTERVAL = "60"
  TELEGRAM_POLL_INTERVAL = "300"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"       # poller must stay running 24/7
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
